<!-- Core: tokens, auth, AI -->
<script type="text/babel">
const { useState, useEffect, useRef } = React;
const PP = {
  gold: '#c9a96e', goldLight: '#e8d5a8', charcoal: '#161616',
  surface: '#1f1e1d', surface2: '#262422', offWhite: '#faf8f5', warm: '#8a8275',
  line: 'rgba(255,255,255,0.07)',
  serif: "'Playfair Display', Georgia, serif",
  sans: "'Inter', -apple-system, system-ui, sans-serif",
};
const store = {
  get(k, fb) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : fb; } catch { return fb; } },
  set(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
  del(k) { try { localStorage.removeItem(k); } catch {} },
};
const _enc = new TextEncoder();
function _hex(buf) { return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2,'0')).join(''); }
function _hexToBuf(h) { const a = new Uint8Array(h.length/2); for(let i=0;i<a.length;i++) a[i]=parseInt(h.substr(i*2,2),16); return a; }
function _randSalt() {
  if(window.crypto&&crypto.getRandomValues){const a=new Uint8Array(16);crypto.getRandomValues(a);return _hex(a.buffer);}
  return Array.from({length:32},()=>Math.floor(Math.random()*16).toString(16)).join('');
}
async function _derive(pw, salt) {
  if(window.crypto&&crypto.subtle&&crypto.subtle.importKey){
    try{const km=await crypto.subtle.importKey('raw',_enc.encode(pw),'PBKDF2',false,['deriveBits']);const bits=await crypto.subtle.deriveBits({name:'PBKDF2',salt:_hexToBuf(salt),iterations:100000,hash:'SHA-256'},km,256);return _hex(bits);}catch(e){}
  }
  if(window.crypto&&crypto.subtle&&crypto.subtle.digest){const d=await crypto.subtle.digest('SHA-256',_enc.encode(salt+':'+pw));return _hex(d);}
  let h=2166136261;const s=salt+':'+pw;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return(h>>>0).toString(16);
}
const auth = {
  users(){return store.get('pp_users',{});},
  current(){const e=store.get('pp_session',null);return e?(this.users()[e]?{email:e,name:this.users()[e].name}:null):null;},
  async register(name,email,password){
    name=(name||'').trim();email=(email||'').trim().toLowerCase();
    if(!name)throw new Error('Please enter your name.');
    if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email))throw new Error('Enter a valid email.');
    if((password||'').length<6)throw new Error('Password must be at least 6 characters.');
    const users=this.users();if(users[email])throw new Error('Account already exists.');
    const salt=_randSalt();const hash=await _derive(password,salt);
    users[email]={name,salt,hash,created:Date.now()};store.set('pp_users',users);store.set('pp_session',email);
    return{email,name};
  },
  async login(email,password){
    email=(email||'').trim().toLowerCase();const users=this.users();const u=users[email];
    if(!u)throw new Error('No account found.');const hash=await _derive(password,u.salt);
    if(hash!==u.hash)throw new Error('Incorrect password.');store.set('pp_session',email);return{email,name:u.name};
  },
  logout(){store.del('pp_session');},
};
window.ppComplete = async function(arg) {
  if(window.claude&&typeof window.claude.complete==='function') return await window.claude.complete(arg);
  const body=typeof arg==='string'?{prompt:arg}:{messages:arg.messages};
  const r=await fetch('/api/claude',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok){let e={};try{e=await r.json();}catch(_){}throw new Error(e.error||('AI error '+r.status));}
  return (await r.json()).text||'';
};
// Resize image to max 1024px before sending (prevents payload-too-large errors)
window.ppResizeImage = function(dataUrl, maxDim = 1024, quality = 0.72) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxDim / Math.max(img.width || maxDim, img.height || maxDim));
      const w = Math.max(1, Math.round(img.width * scale));
      const h = Math.max(1, Math.round(img.height * scale));
      const c = document.createElement('canvas'); c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(c.toDataURL('image/jpeg', quality));
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
};
window.ppDetectIngredients = async function(dataUrl) {
  // Resize first to stay well under Vercel's 4.5MB body limit
  dataUrl = await window.ppResizeImage(dataUrl, 1024, 0.72);
  const m=/^data:(image\/[a-zA-Z0-9.+-]+);base64,(.*)$/.exec(dataUrl||'');
  if(!m)throw new Error('no-image');
  const res=await window.ppComplete({messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:m[1],data:m[2]}},{type:'text',text:'Identify edible food ingredients visible in this photo. Respond ONLY with a JSON array of short ingredient names, Title Case, max 12. Example: ["Eggs","Tomatoes"]'}]}]});
  const match=String(res).match(/\[[\s\S]*\]/);if(!match)return[];
  let arr=JSON.parse(match[0]);arr=(Array.isArray(arr)?arr:[]).filter(x=>typeof x==='string').map(s=>s.trim()).filter(Boolean);
  const seen=new Set();const out=[];for(const a of arr){const k=a.toLowerCase();if(!seen.has(k)){seen.add(k);out.push(a);}}
  return out.slice(0,12);
};
window.ppGenerateRecipe = async function(pantry) {
  const list=(pantry||[]).filter(Boolean).join(', ')||'common pantry staples';
  const res=await window.ppComplete(`You are a creative chef. Invent ONE recipe using: ${list}. Assume salt, pepper, oil, water available. Respond ONLY with minified JSON: {"name":string,"cuisine":string,"time":string,"cal":number,"protein":string,"servings":number,"difficulty":string,"ingredients":[string],"steps":[string]}`);
  const match=String(res).match(/\{[\s\S]*\}/);if(!match)throw new Error('Could not parse recipe.');
  const obj=JSON.parse(match[0]);obj.id='ai_'+Date.now();obj.aiGenerated=true;obj.img=null;
  obj.cuisine=obj.cuisine||'AI Original';obj.difficulty=obj.difficulty||'Easy';
  obj.ingredients=Array.isArray(obj.ingredients)?obj.ingredients:[];obj.steps=Array.isArray(obj.steps)?obj.steps:[];
  return obj;
};
// Shared atoms
function Label({children,style}){return <div style={{fontFamily:PP.sans,fontSize:10.5,letterSpacing:3,textTransform:'uppercase',color:PP.gold,fontWeight:500,...style}}>{children}</div>;}
function Wordmark({size=19}){return <div style={{fontFamily:PP.serif,fontSize:size,fontWeight:700,color:PP.gold,whiteSpace:'nowrap',flexShrink:0}}>Pantry Pal</div>;}
function initialsOf(name){const p=(name||'').trim().split(/\s+/).filter(Boolean);if(!p.length)return'·';return(p[0][0]+(p[1]?p[1][0]:'')).toUpperCase();}
function InitialsAvatar({name,size=38}){return <div style={{width:size,height:size,borderRadius:'50%',flexShrink:0,background:'linear-gradient(135deg,rgba(201,169,110,0.9),rgba(232,213,168,0.75))',display:'flex',alignItems:'center',justifyContent:'center',color:PP.charcoal,fontFamily:PP.serif,fontWeight:700,fontSize:size*0.4}}>{initialsOf(name)}</div>;}
function GuestAvatar({size=38}){return <div style={{width:size,height:size,borderRadius:'50%',flexShrink:0,border:`1px solid ${PP.line}`,background:'rgba(255,255,255,0.04)',display:'flex',alignItems:'center',justifyContent:'center'}}><svg width={size*0.5} height={size*0.5} viewBox="0 0 24 24" fill="none" stroke={PP.warm} strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>;}
function GoldButton({children,onClick,style,disabled}){return <button className="pp-tap" onClick={onClick} disabled={disabled} style={{width:'100%',padding:'14px',background:`linear-gradient(135deg,${PP.gold},${PP.goldLight})`,border:'none',borderRadius:12,cursor:disabled?'default':'pointer',fontFamily:PP.sans,fontSize:13,fontWeight:700,letterSpacing:1.5,textTransform:'uppercase',color:PP.charcoal,opacity:disabled?0.5:1,display:'flex',alignItems:'center',justifyContent:'center',gap:9,...style}}>{children}</button>;}
function Field({label,type='text',value,onChange,placeholder,autoFocus}){return <div style={{marginBottom:13}}><label style={{fontFamily:PP.sans,fontSize:11,color:PP.warm,display:'block',marginBottom:6}}>{label}</label><input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} autoFocus={autoFocus} autoComplete={type==='password'?'current-password':'off'} autoCapitalize="off" spellCheck="false" style={{width:'100%',boxSizing:'border-box',background:'rgba(255,255,255,0.04)',border:`1px solid ${PP.line}`,borderRadius:11,padding:'13px 14px',fontFamily:PP.sans,fontSize:15,color:PP.offWhite,outline:'none'}}/></div>;}
const SparkleIcon=({s=16,c=PP.charcoal})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3l1.8 4.8L18.6 9.6 13.8 11.4 12 16.2 10.2 11.4 5.4 9.6 10.2 7.8z"/><path d="M19 14l.7 1.9 1.9.7-1.9.7-.7 1.9-.7-1.9-1.9-.7 1.9-.7z"/></svg>;
Object.assign(window,{PP,store,auth,Label,Wordmark,initialsOf,InitialsAvatar,GuestAvatar,GoldButton,Field,SparkleIcon});
</script>

window.RECIPES = [
  {id:'salmon',name:'Pan-Seared Salmon & Asparagus',cuisine:'Seafood',time:'25 min',cal:380,protein:'34g',servings:2,difficulty:'Easy',img:'https://images.unsplash.com/photo-1563379926898-05f4575a45d8?w=900&q=80&auto=format',ingredients:['Salmon fillets','Asparagus','Olive oil','Butter','Garlic','Lemon','Fresh dill','Salt','Black pepper','Capers'],steps:['Pat salmon dry and season both sides with salt and pepper.','Heat olive oil in a skillet over medium-high until shimmering.','Sear salmon skin-side up for 4 minutes until a golden crust forms.','Flip, add butter and minced garlic, baste for 2 minutes.','Remove salmon, sauté asparagus with a squeeze of lemon, 3–4 min.','Plate salmon over asparagus, garnish with dill and capers.']},

  {id:'cake',name:'Dark Chocolate Layer Cake',cuisine:'Dessert',time:'1 hr 45 min',cal:450,protein:'6g',servings:12,difficulty:'Medium',img:'https://images.unsplash.com/photo-1565958011703-44f9829ba187?w=900&q=80&auto=format',ingredients:['Dark chocolate','Flour','Cocoa powder','Butter','Sugar','Eggs','Buttermilk','Vanilla','Baking soda','Espresso powder','Heavy cream'],steps:['Melt chocolate with espresso; cool.','Whisk flour, cocoa, sugar, baking soda.','Beat eggs with buttermilk and vanilla, fold in chocolate.','Bake in three pans at 350°F for 25–30 min.','Make ganache; layer and frost cooled cakes.']},
];
window.recommend = function(pantry) {
  const items=(pantry||[]).map(p=>p.toLowerCase().trim()).filter(Boolean);
  return window.RECIPES.map(r=>{
    const ing=r.ingredients.map(i=>i.toLowerCase());
    const matched=items.filter(it=>ing.some(i=>i.includes(it)||it.includes(i)));
    return{...r,matchCount:matched.length,matched};
  }).sort((a,b)=>b.matchCount-a.matchCount||a.cal-b.cal);
};

<!-- Shared UI: Recipe Detail overlay + Auth Sheet (used by both mobile & desktop) -->
<script type="text/babel">
const {useState:useStateShared}=React;
function AIHero({height=200}){
  return <div style={{width:'100%',height,position:'relative',overflow:'hidden',background:'linear-gradient(135deg,#2b2622 0%,#1b1916 60%,#211d18 100%)'}}>
    <div style={{position:'absolute',top:-20,right:-10,opacity:0.14}}><SparkleIcon s={150} c={PP.gold}/></div>
    <div style={{position:'absolute',inset:0,background:'linear-gradient(to top,rgba(0,0,0,0.82) 0%,rgba(0,0,0,0.1) 60%,transparent 100%)'}}/>
  </div>;
}
function RecipeDetail({r,pantry,isSaved,isCooked,onSave,onCook,onClose,desktop}){
  const have=new Set(pantry.map(p=>p.toLowerCase()));
  const has=(ing)=>{const l=ing.toLowerCase();return[...have].some(h=>l.includes(h)||h.includes(l));};
  const containerStyle = desktop ? {
    position:'fixed',inset:0,zIndex:80,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,0.7)',backdropFilter:'blur(8px)'
  } : {
    position:'absolute',inset:0,zIndex:40,background:PP.charcoal,display:'flex',flexDirection:'column'
  };
  const innerStyle = desktop ? {

function AuthSheet({onClose,onAuthed,desktop}){
  const [mode,setMode]=useStateShared('register');
  const [name,setName]=useStateShared('');
  const [email,setEmail]=useStateShared('');
  const [pw,setPw]=useStateShared('');
  const [err,setErr]=useStateShared(null);
  const [busy,setBusy]=useStateShared(false);
  const submit=async()=>{
    setErr(null);setBusy(true);
    try{const u=mode==='register'?await auth.register(name,email,pw):await auth.login(email,pw);onAuthed(u);}
    catch(e){setErr(e.message||'Something went wrong.');}
    setBusy(false);
  };
  const containerStyle=desktop?{position:'fixed',inset:0,zIndex:90,background:'rgba(0,0,0,0.7)',backdropFilter:'blur(8px)',display:'flex',alignItems:'center',justifyContent:'center'}:{position:'absolute',inset:0,zIndex:45,background:'rgba(0,0,0,0.6)',backdropFilter:'blur(6px)',display:'flex',alignItems:'flex-end'};

      <div onClick={e=>e.stopPropagation()} style={innerStyle}>

          <h2 style={{fontFamily:PP.serif,fontSize:27,fontWeight:700,color:PP.offWhite,margin:'6px 0 4px'}}>{mode==='register'?'Create account':'Welcome back'}</h2>
          <div style={{fontFamily:PP.sans,fontSize:13,color:PP.warm}}>{mode==='register'?'Save recipes on this device.':'Sign in to your kitchen.'}</div>
        </div>
        {mode==='register'&&<Field label="Name" value={name} onChange={setName} placeholder="Alex Rivera" autoFocus/>}
        <Field label="Email" type="email" value={email} onChange={setEmail} placeholder="you@example.com" autoFocus={mode==='login'}/>
        <Field label="Password" type="password" value={pw} onChange={setPw} placeholder={mode==='register'?'At least 6 characters':'Your password'}/>
        {err&&<div style={{fontFamily:PP.sans,fontSize:12.5,color:'#e0936f',margin:'2px 0 12px',textAlign:'center'}}>{err}</div>}
        <GoldButton onClick={submit} disabled={busy} style={{marginTop:6}}>{busy?'Please wait…':(mode==='register'?'Create account':'Sign in')}</GoldButton>
        <div style={{textAlign:'center',marginTop:16,fontFamily:PP.sans,fontSize:12.5,color:PP.warm}}>
          {mode==='register'?'Already have an account? ':"Don't have an account? "}
          <button className="pp-tap" onClick={()=>{setErr(null);setMode(mode==='register'?'login':'register');}} style={{background:'none',border:'none',cursor:'pointer',color:PP.goldLight,fontFamily:PP.sans,fontSize:12.5,fontWeight:600,padding:0}}>{mode==='register'?'Sign in':'Create one'}</button>
        </div>
        <div style={{fontFamily:PP.sans,fontSize:10.5,color:'rgba(255,255,255,0.3)',textAlign:'center',marginTop:14}}>🔒 Password hashed (PBKDF2) — stored only on this device.</div>
      </div>
    </div>
  );
}

    {key:'saved',label:'Saved',icon:<path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>},
    {key:'scan',label:'Scan',icon:<React.Fragment><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="3.5"/></React.Fragment>},
    {key:'profile',label:'Profile',icon:<React.Fragment><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></React.Fragment>},
  ];

  return <div style={{display:'flex',height:'100vh',background:'#0f0e0d',overflow:'hidden'}}>
    {/* Sidebar */}
    <div style={{width:260,flexShrink:0,display:'flex',flexDirection:'column',background:'#141312',borderRight:`1px solid ${PP.line}`,padding:'28px 16px 24px'}}>
      <div style={{padding:'0 8px 28px'}}>
        <Wordmark size={22}/>
        <div style={{fontFamily:PP.sans,fontSize:11.5,color:PP.warm,marginTop:4,letterSpacing:0.3}}>AI Recipe Assistant</div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:4,flex:1}}>
        {navItems.map(n=><NavItem key={n.key} icon={n.icon} label={n.label} active={tab===n.key} onClick={()=>setTab(n.key)}/>)}
      </div>
      {/* Pantry quick-add */}
      <div style={{borderTop:`1px solid ${PP.line}`,paddingTop:20,marginTop:8}}>
        <div style={{fontFamily:PP.sans,fontSize:10.5,letterSpacing:2.5,textTransform:'uppercase',color:PP.gold,marginBottom:12}}>My Pantry</div>
        <div style={{display:'flex',alignItems:'center',gap:8,background:'rgba(255,255,255,0.04)',border:`1px solid ${PP.line}`,borderRadius:10,padding:'9px 10px',marginBottom:10}}>
          <input value={draft} onChange={e=>setDraft(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')addItem();}} placeholder="Add ingredient…" style={{flex:1,minWidth:0,background:'transparent',border:'none',outline:'none',fontFamily:PP.sans,fontSize:13,color:PP.offWhite}}/>
          <button className="pp-tap" onClick={addItem} style={{background:'none',border:'none',cursor:'pointer',padding:0,display:'flex',flexShrink:0}}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={PP.gold} strokeWidth="2" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
        </div>
        {pantry.length>0&&<div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:12}}>
          {pantry.map(c=><button key={c} className="pp-tap" onClick={()=>removeItem(c)} style={{display:'flex',alignItems:'center',gap:5,padding:'5px 10px',borderRadius:100,background:'rgba(201,169,110,0.1)',border:'1px solid rgba(201,169,110,0.2)',fontFamily:PP.sans,fontSize:11,color:PP.goldLight,cursor:'pointer'}}>{c}<svg width="8" height="8" viewBox="0 0 10 10" fill="none" stroke={PP.gold} strokeWidth="1.6" strokeLinecap="round"><path d="M1 1l8 8M9 1l-8 8"/></svg></button>)}
        </div>}
        <GoldButton onClick={onGenerate} disabled={generating} style={{padding:'12px'}}>
          {generating?<React.Fragment><span className="pp-spin" style={{width:13,height:13,borderRadius:'50%',border:'2px solid rgba(22,22,22,0.35)',borderTopColor:PP.charcoal,display:'inline-block'}}/> Inventing…</React.Fragment>:<React.Fragment><SparkleIcon s={14}/> Create with AI</React.Fragment>}
        </GoldButton>
      </div>
      {/* User */}
      <div style={{borderTop:`1px solid ${PP.line}`,paddingTop:16,marginTop:16}}>
        <button className="pp-tap" onClick={()=>setTab('profile')} style={{display:'flex',alignItems:'center',gap:10,width:'100%',background:'none',border:'none',cursor:'pointer',padding:'4px 8px',borderRadius:10}}>
          {user?<InitialsAvatar name={user.name} size={34}/>:<GuestAvatar size={34}/>}
          <div style={{textAlign:'left',minWidth:0}}>
            <div style={{fontFamily:PP.sans,fontSize:13,color:PP.offWhite,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user?user.name:'Guest'}</div>
            <div style={{fontFamily:PP.sans,fontSize:11,color:PP.warm}}>{user?user.email:'Not signed in'}</div>
          </div>
        </button>
      </div>
    </div>

    {/* Main content */}
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      {/* Top bar */}
      <div style={{height:64,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 32px',borderBottom:`1px solid ${PP.line}`,flexShrink:0,background:'rgba(15,14,13,0.8)',backdropFilter:'blur(10px)'}}>
        <div style={{fontFamily:PP.serif,fontSize:22,fontWeight:700,color:PP.offWhite}}>
          {tab==='home'&&(personalized?"Tonight's Picks":'Explore Recipes')}
          {tab==='saved'&&'Saved Recipes'}
          {tab==='scan'&&'Scan Pantry'}
          {tab==='profile'&&'Profile'}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          {pantry.length>0&&<div style={{fontFamily:PP.sans,fontSize:12,color:PP.warm,background:'rgba(201,169,110,0.08)',border:`1px solid ${PP.line}`,borderRadius:100,padding:'6px 14px'}}>{pantry.length} ingredient{pantry.length!==1?'s':''} in pantry</div>}
          <button className="pp-tap" onClick={()=>setShowAuth(true)} style={{background:'none',border:'none',cursor:'pointer',padding:0}}>
            {user?<InitialsAvatar name={user.name} size={36}/>:<GuestAvatar size={36}/>}
          </button>
        </div>
      </div>

      {/* Scrollable content */}
      <div style={{flex:1,overflow:'auto',padding:'32px'}}>
        {tab==='home'&&<React.Fragment>
          {aiRecipes.length>0&&<React.Fragment>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16}}><SparkleIcon s={14} c={PP.gold}/><Label>Your AI Creations</Label></div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:18,marginBottom:40}}>
              {aiRecipes.slice(0,3).map(r=><DesktopRecipeCard key={r.id} r={r} onOpen={setOpenId} pantry={pantry}/>)}
            </div>
          </React.Fragment>}
          <Label>{personalized?'From Your Pantry':'Popular Recipes'}</Label>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:18,marginTop:16}}>
            {ranked.map(r=><DesktopRecipeCard key={r.id} r={r} onOpen={setOpenId} pantry={pantry}/>)}
          </div>
        </React.Fragment>}

        {tab==='saved'&&<React.Fragment>
          {savedRecipes.length===0?<div style={{textAlign:'center',paddingTop:80}}>
            <div style={{width:72,height:72,margin:'0 auto 20px',borderRadius:'50%',background:'rgba(201,169,110,0.1)',display:'flex',alignItems:'center',justifyContent:'center'}}><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke={PP.gold} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg></div>
            <div style={{fontFamily:PP.serif,fontSize:22,color:PP.offWhite,marginBottom:8}}>Nothing saved yet</div>
            <div style={{fontFamily:PP.sans,fontSize:14,color:PP.warm,marginBottom:24}}>Click the bookmark on any recipe to save it here.</div>
            <button className="pp-tap" onClick={()=>setTab('home')} style={{padding:'13px 28px',background:'rgba(201,169,110,0.12)',border:'1px solid rgba(201,169,110,0.3)',borderRadius:100,cursor:'pointer',fontFamily:PP.sans,fontSize:12,fontWeight:600,letterSpacing:1,textTransform:'uppercase',color:PP.goldLight}}>Browse Recipes</button>
          </div>:<div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:18}}>
            {savedRecipes.map(r=><DesktopRecipeCard key={r.id} r={r} onOpen={setOpenId} pantry={pantry}/>)}
          </div>}
        </React.Fragment>}

        {tab==='scan'&&<DesktopScanPanel onAdd={(arr)=>{addMany(arr);setTab('home');}}/>}

        {tab==='profile'&&<div style={{maxWidth:560}}>
          <div style={{display:'flex',alignItems:'center',gap:20,marginBottom:36}}>
            {user?<InitialsAvatar name={user.name} size={72}/>:<GuestAvatar size={72}/>}
            <div>
              <h2 style={{fontFamily:PP.serif,fontSize:26,fontWeight:700,color:PP.offWhite,marginBottom:4}}>{user?user.name:'Guest'}</h2>
              <div style={{fontFamily:PP.sans,fontSize:14,color:PP.warm}}>{user?user.email:'Not signed in'}</div>
            </div>
          </div>
          {!user&&<div style={{marginBottom:32,maxWidth:400}}><GoldButton onClick={()=>setShowAuth(true)}>Create account or sign in</GoldButton></div>}
          {user&&<div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:36}}>
            {[[String(savedIds.length),'Saved'],[String(cookedIds.length),'Cooked'],[String(aiRecipes.length),'AI Made'],[String(pantry.length),'Pantry']].map(([v,l])=>(
              <div key={l} style={{background:PP.surface,border:`1px solid ${PP.line}`,borderRadius:14,padding:'18px 12px',textAlign:'center'}}>
                <div style={{fontFamily:PP.serif,fontSize:24,fontWeight:700,color:PP.gold}}>{v}</div>
                <div style={{fontFamily:PP.sans,fontSize:10,letterSpacing:1.5,textTransform:'uppercase',color:PP.warm,marginTop:4}}>{l}</div>
              </div>
            ))}
          </div>}
          {user&&<button className="pp-tap" onClick={()=>{onLogout();}} style={{padding:'14px 28px',background:'transparent',border:'1px solid rgba(255,255,255,0.14)',borderRadius:12,cursor:'pointer',fontFamily:PP.sans,fontSize:12,fontWeight:600,letterSpacing:1.5,textTransform:'uppercase',color:PP.warm}}>Sign Out</button>}
        </div>}
      </div>
    </div>

    {/* Overlays */}
    {openRecipe&&<RecipeDetail r={openRecipe} pantry={pantry} isSaved={savedIds.includes(openRecipe.id)} isCooked={cookedIds.includes(openRecipe.id)} onSave={toggleSave} onCook={toggleCook} onClose={()=>setOpenId(null)} desktop/>}
    {showAuth&&<AuthSheet onClose={()=>setShowAuth(false)} onAuthed={onAuthed} desktop/>}
    {toast&&<div style={{position:'fixed',bottom:28,left:'50%',transform:'translateX(-50%)',zIndex:100,background:'#2a2724',border:`1px solid ${PP.line}`,borderRadius:12,padding:'13px 24px',fontFamily:PP.sans,fontSize:13,color:PP.offWhite,boxShadow:'0 10px 30px rgba(0,0,0,0.4)',whiteSpace:'nowrap'}}>{toast}</div>}
  </div>;
}
window.DesktopLayout=DesktopLayout;
</script>

<!-- App Shell -->
<script type="text/babel">
const {useState:useStateApp,useEffect:useEffectApp}=React;
const {PP:PPa,store:storeA,auth:authA,SparkleIcon:SparkleIconA}=window;

function PantryApp(){
  const [tab,setTab]=useStateApp('home');
  const [pantry,setPantry]=useStateApp(()=>storeA.get('pp_pantry',[]));
  const [savedIds,setSavedIds]=useStateApp(()=>storeA.get('pp_saved',[]));
  const [cookedIds,setCookedIds]=useStateApp(()=>storeA.get('pp_cooked',[]));
  const [aiRecipes,setAiRecipes]=useStateApp(()=>storeA.get('pp_ai_recipes',[]));
  const [user,setUser]=useStateApp(()=>authA.current());
  const [draft,setDraft]=useStateApp('');
  const [openId,setOpenId]=useStateApp(null);
  const [showAuth,setShowAuth]=useStateApp(false);
  const [generating,setGenerating]=useStateApp(false);
  const [toast,setToast]=useStateApp(null);
  const [isDesktop,setIsDesktop]=useStateApp(()=>window.__forceMobile?false:window.innerWidth>=768);

  useEffectApp(()=>{
    const check=()=>setIsDesktop(window.__forceMobile?false:window.innerWidth>=768);
    window.__ppRecheckLayout=check;
    window.addEventListener('resize',check);return()=>window.removeEventListener('resize',check);
  },[]);

  useEffectApp(()=>storeA.set('pp_pantry',pantry),[pantry]);
  useEffectApp(()=>storeA.set('pp_saved',savedIds),[savedIds]);
  useEffectApp(()=>storeA.set('pp_cooked',cookedIds),[cookedIds]);
  useEffectApp(()=>storeA.set('pp_ai_recipes',aiRecipes),[aiRecipes]);

  const flashToast=(m)=>{setToast(m);setTimeout(()=>setToast(null),2600);};
  const addItem=()=>{const v=draft.trim();if(v&&!pantry.some(p=>p.toLowerCase()===v.toLowerCase()))setPantry([...pantry,v]);setDraft('');};
  const removeItem=(c)=>setPantry(pantry.filter(x=>x!==c));
  const addMany=(arr)=>{const lower=pantry.map(p=>p.toLowerCase());const add=(arr||[]).filter(a=>!lower.includes(a.toLowerCase()));setPantry([...pantry,...add]);setTab('home');if(add.length)flashToast(`Added ${add.length} ingredient${add.length>1?'s':''}`);};
  const toggleSave=(id)=>setSavedIds(savedIds.includes(id)?savedIds.filter(x=>x!==id):[...savedIds,id]);
  const toggleCook=(id)=>setCookedIds(cookedIds.includes(id)?cookedIds.filter(x=>x!==id):[...cookedIds,id]);
  const onGenerate=async()=>{
    if(generating)return;setGenerating(true);
    try{const recipe=await window.ppGenerateRecipe(pantry);setAiRecipes(prev=>[recipe,...prev].slice(0,30));setGenerating(false);setOpenId(recipe.id);}
    catch(e){setGenerating(false);flashToast('Could not create a recipe — please try again.');}
  };
  const onAuthed=(u)=>{setUser(u);setShowAuth(false);flashToast(`Welcome, ${u.name.split(' ')[0]}!`);};
  const onLogout=()=>{authA.logout();setUser(null);flashToast('Signed out');};

  const allRecipes=[...aiRecipes,...window.RECIPES];
  const findRecipe=(id)=>allRecipes.find(r=>r.id===id)||null;
  const ranked=window.recommend(pantry);
  const savedRecipes=savedIds.map(findRecipe).filter(Boolean);
  const openRecipe=openId?findRecipe(openId):null;

  const sharedState={tab,pantry,draft,savedIds,cookedIds,aiRecipes,user,generating,openId,showAuth,toast};
  const sharedActions={setTab,setDraft,addItem,removeItem,addMany,toggleSave,toggleCook,setOpenId,setShowAuth,onGenerate,onAuthed,onLogout};

  // ── DESKTOP ──
  if(isDesktop){
    return <window.DesktopLayout state={sharedState} actions={sharedActions}/>;
  }

  // ── MOBILE ──

  return <div style={{position:'fixed',inset:0,background:PPa.charcoal}}>
    <div style={{position:'relative',height:'100%',display:'flex',flexDirection:'column',background:PPa.charcoal,overflow:'hidden'}}>
      <div style={{flex:1,overflow:'auto',WebkitOverflowScrolling:'touch'}}>
        {tab==='home'&&<window.MobileHomeScreen user={user} pantry={pantry} draft={draft} setDraft={setDraft} addItem={addItem} removeItem={removeItem} ranked={ranked} creations={aiRecipes} onOpen={setOpenId} goScan={()=>setTab('scan')} onGenerate={onGenerate} generating={generating} onAvatar={()=>setTab('profile')}/>}
        {tab==='saved'&&<window.MobileSavedScreen savedRecipes={savedRecipes} onOpen={setOpenId} goHome={()=>setTab('home')}/>}
        {tab==='scan'&&<window.MobileScanScreen onAdd={addMany}/>}
        {tab==='profile'&&<window.MobileProfileScreen user={user} savedCount={savedIds.length} cookedCount={cookedIds.length} pantryCount={pantry.length} creationsCount={aiRecipes.length} onAuth={()=>setShowAuth(true)} onLogout={onLogout}/>}
      </div>
      <window.TabBar active={tab} onSelect={setTab}/>
      {openRecipe&&<RecipeDetail r={openRecipe} pantry={pantry} isSaved={savedIds.includes(openRecipe.id)} isCooked={cookedIds.includes(openRecipe.id)} onSave={toggleSave} onCook={toggleCook} onClose={()=>setOpenId(null)}/>}
      {showAuth&&<AuthSheet onClose={()=>setShowAuth(false)} onAuthed={onAuthed}/>}
      {generating&&<div style={{position:'absolute',inset:0,zIndex:60,background:'rgba(15,14,13,0.78)',backdropFilter:'blur(6px)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:18}}>
        <span className="pp-spin" style={{width:34,height:34,borderRadius:'50%',border:'3px solid rgba(201,169,110,0.25)',borderTopColor:PPa.gold,display:'inline-block'}}/>
        <div style={{fontFamily:PPa.sans,fontSize:14,color:'#fff',display:'flex',alignItems:'center',gap:8}}><SparkleIconA s={16} c={PPa.goldLight}/> Creating your recipe…</div>
      </div>}
      {toast&&<div style={{position:'absolute',left:22,right:22,bottom:'calc(90px + env(safe-area-inset-bottom))',zIndex:70,background:'#2a2724',border:`1px solid ${PPa.line}`,borderRadius:12,padding:'13px 16px',fontFamily:PPa.sans,fontSize:13,color:PPa.offWhite,textAlign:'center',boxShadow:'0 10px 30px rgba(0,0,0,0.4)'}}>{toast}</div>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<PantryApp/>);
</script>
</body>
</html>
