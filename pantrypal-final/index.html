<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0" />
<meta name="theme-color" content="#161616" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="mobile-web-app-capable" content="yes" />
<title>Pantry Pal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: #0d0d0c;
    background-image: radial-gradient(circle at 50% 30%, #1c1b19 0%, #0d0d0c 70%);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; min-height: 100dvh; padding: 12px;
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }
  #root { display: flex; align-items: center; justify-content: center; }

  /* fullscreen on small screens — no device frame, no body padding */
  @media (max-width: 640px) {
    body { padding: 0; background: #161616; }
  }

  /* App feel: hide scrollbars everywhere */
  * { scrollbar-width: none; -ms-overflow-style: none; }
  *::-webkit-scrollbar { display: none; width: 0; height: 0; }

  /* Tap feedback */
  .pp-tap { transition: transform 0.12s ease, opacity 0.12s ease; -webkit-tap-highlight-color: transparent; user-select: none; }
  .pp-tap:active { transform: scale(0.97); opacity: 0.82; }
  button:disabled { cursor: default; }
  input, textarea { caret-color: #c9a96e; -webkit-appearance: none; }
  input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.4); }

  @keyframes pp-spin { to { transform: rotate(360deg); } }
  .pp-spin { animation: pp-spin 0.8s linear infinite; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="pp-core.jsx"></script>
  <script type="text/babel" src="recipes-data.jsx"></script>
  <script type="text/babel" src="pp-screens.jsx"></script>
  <script type="text/babel" src="pp-scan.jsx"></script>
  <script type="text/babel" src="pp-app.jsx"></script>
  <script type="text/babel">
    const PantryApp = window.PantryApp;
    ReactDOM.createRoot(document.getElementById('root')).render(<PantryApp />);
  </script>
</body>
</html>
