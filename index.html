<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const PP = {
  gold: '#c9a96e', goldLight: '#e8d5a8', charcoal: '#161616',
  surface: '#1f1e1d', surface2: '#262422', offWhite: '#faf8f5', warm: '#8a8275',
  line: 'rgba(255,255,255,0.07)',
  serif: "'Playfair Display', Georgia, serif",
  sans: "'Inter', -apple-system, system-ui, sans-serif",

const store = {
  get(k, fb) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : fb; } catch { return fb; } },
  set(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
  del(k) { try { localStorage.removeItem(k); } catch {} },
};
const _enc = new TextEncoder();
function _hex(buf) { return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, '0')).join(''); }
function _hexToBuf(h) { const a = new Uint8Array(h.length / 2); for (let i = 0; i < a.length; i++) a[i] = parseInt(h.substr(i * 2, 2), 16); return a; }
function _randSaltHex() {
  if (window.crypto && crypto.getRandomValues) { const a = new Uint8Array(16); crypto.getRandomValues(a); return _hex(a.buffer); }
  return Array.from({ length: 32 }, () => Math.floor(Math.random() * 16).toString(16)).join('');
}
async function _derive(password, saltHex) {
  if (window.crypto && crypto.subtle && crypto.subtle.importKey) {
    try {
      const km = await crypto.subtle.importKey('raw', _enc.encode(password), 'PBKDF2', false, ['deriveBits']);
      const bits = await crypto.subtle.deriveBits({ name: 'PBKDF2', salt: _hexToBuf(saltHex), iterations: 100000, hash: 'SHA-256' }, km, 256);
      return _hex(bits);
    } catch (e) {}
  }
  if (window.crypto && crypto.subtle && crypto.subtle.digest) {
    const d = await crypto.subtle.digest('SHA-256', _enc.encode(saltHex + ':' + password));
    return _hex(d);
  }
  let h = 2166136261; const s = saltHex + ':' + password;
  for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); }
  return (h >>> 0).toString(16);
}
const auth = {
  users() { return store.get('pp_users', {}); },
  current() { const e = store.get('pp_session', null); return e ? (this.users()[e] ? { email: e, name: this.users()[e].name } : null) : null; },
  async register(name, email, password) {
    name = (name || '').trim(); email = (email || '').trim().toLowerCase();
    if (!name) throw new Error('Please enter your name.');
    if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) throw new Error('Enter a valid email address.');
    if ((password || '').length < 6) throw new Error('Password must be at least 6 characters.');
    const users = this.users();
    if (users[email]) throw new Error('An account with this email already exists.');
    const salt = _randSaltHex();
    const hash = await _derive(password, salt);
    users[email] = { name, salt, hash, created: Date.now() };
    store.set('pp_users', users); store.set('pp_session', email);
    return { email, name };
  },
  async login(email, password) {
    email = (email || '').trim().toLowerCase();
    const users = this.users(); const u = users[email];
    if (!u) throw new Error('No account found for that email.');
    const hash = await _derive(password, u.salt);
    if (hash !== u.hash) throw new Error('Incorrect password.');
    store.set('pp_session', email);
    return { email, name: u.name };
  },
  logout() { store.del('pp_session'); },
};
window.ppComplete = async function(arg) {
  if (window.claude && typeof window.claude.complete === 'function') {
    return await window.claude.complete(arg);
  }
  const body = typeof arg === 'string' ? { prompt: arg } : { messages: arg.messages };
  const r = await fetch('/api/claude', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify(body) });
  if (!r.ok) { let e = {}; try { e = await r.json(); } catch (_) {} throw new Error(e.error || ('AI request failed (' + r.status + ')')); }
  const data = await r.json();
  return data.text || '';
};
window.ppDetectIngredients = async function(dataUrl) {
  const m = /^data:(image\/[a-zA-Z0-9.+-]+);base64,(.*)$/.exec(dataUrl || '');
  if (!m) throw new Error('no-image');
  const media_type = m[1], data = m[2];
  const text = 'Identify the edible food ingredients visible in this photo of a fridge, pantry, or groceries. Respond with ONLY a JSON array of short ingredient names as strings, Title Case, no quantities, no duplicates, maximum 12 items. If you cannot see any food, respond with []. Example: ["Eggs","Tomatoes","Cheddar Cheese"]';
  const res = await window.ppComplete({ messages: [{ role: 'user', content: [{ type: 'image', source: { type: 'base64', media_type, data } }, { type: 'text', text }] }] });
  const match = String(res).match(/\[[\s\S]*\]/);
  if (!match) return [];
  let arr = JSON.parse(match[0]);
  arr = (Array.isArray(arr) ? arr : []).filter(x => typeof x === 'string').map(s => s.trim()).filter(Boolean);
  const seen = new Set(); const out = [];
  for (const a of arr) { const k = a.toLowerCase(); if (!seen.has(k)) { seen.add(k); out.push(a); } }
  return out.slice(0, 12);
};
window.ppGenerateRecipe = async function(pantry) {
  const list = (pantry || []).filter(Boolean).join(', ') || 'common pantry staples';
  const text = `You are a creative, practical chef. Invent ONE appealing recipe that primarily uses these ingredients the user already has: ${list}. Assume salt, pepper, cooking oil and water are available. Respond with ONLY minified JSON (no markdown, no prose) of exactly this shape: {"name":string,"cuisine":string,"time":string,"cal":number,"protein":string,"servings":number,"difficulty":string,"ingredients":[string],"steps":[string]}. "time" like "30 min". "protein" like "28g". Provide 6 to 11 ingredient strings WITH quantities, and 4 to 7 clear step strings.`;
  const res = await window.ppComplete(text);
  const match = String(res).match(/\{[\s\S]*\}/);
  if (!match) throw new Error('Could not parse recipe.');
  const obj = JSON.parse(match[0]);
  obj.id = 'ai_' + Date.now(); obj.aiGenerated = true; obj.img = null;
  obj.cuisine = obj.cuisine || 'AI Original'; obj.difficulty = obj.difficulty || 'Easy';

};
function Label({ children, style }) {

}

}

}
function Field({ label, type = 'text', value, onChange, placeholder, autoFocus }) {

const SparkleIcon = ({ s = 16, c = PP.charcoal }) => (

            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round"><path d="M6 6l12 12M18 6L6 18" /></svg>

            <svg width="17" height="17" viewBox="0 0 24 24" fill={isSaved ? _PP.gold : 'none'} stroke={isSaved ? _PP.gold : '#fff'} strokeWidth="1.8"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" /></svg>

            <div style={{ fontFamily: _PP.serif, fontSize: 27, fontWeight: 700, color: '#fff', lineHeight: 1.12 }}>{r.name}</div>
          </div>
        </div>
        <div style={{ padding: '20px 22px 28px' }}>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 9 }}>
            {[[String(r.time).replace(' min','m').replace(' hr','h'), 'Time'], [r.cal, 'Cal'], [r.protein, 'Protein'], [r.servings, 'Serves']].map(([v, l]) => (
              <div key={l} style={{ background: _PP.surface, border: `1px solid ${_PP.line}`, borderRadius: 12, padding: '13px 6px', textAlign: 'center' }}>

          </div>
          <div style={{ marginTop: 26 }}>
            <div style={{ fontFamily: _PP.sans, fontSize: 10.5, letterSpacing: 3, textTransform: 'uppercase', color: _PP.gold, paddingBottom: 10, borderBottom: '1px solid rgba(201,169,110,0.18)' }}>Ingredients</div>
            <div style={{ marginTop: 12 }}>

                <div key={ing + idx} style={{ display: 'flex', alignItems: 'center', gap: 11, padding: '8px 0', fontFamily: _PP.sans, fontSize: 14, color: _PP.offWhite }}>

                  </span>

                  {has(ing) && <span style={{ fontFamily: _PP.sans, fontSize: 10, letterSpacing: 1, textTransform: 'uppercase', color: _PP.gold }}>In pantry</span>}

          <div style={{ marginTop: 26 }}>

            <div style={{ marginTop: 14 }}>

                <div key={i} style={{ display: 'flex', gap: 14, padding: '0 0 18px' }}>

                  <div style={{ flex: 1, fontFamily: _PP.sans, fontSize: 13.5, color: 'rgba(255,255,255,0.78)', lineHeight: 1.65, paddingTop: 4 }}>{s}</div>

}
Object.assign(window, { RecipeRow, TabBar, HomeScreen, SavedScreen, ProfileScreen, AuthSheet, RecipeDetail, AIHero });

<script type="text/babel">
const { useState: useStateScan, useEffect: useEffectScan, useRef: useRefScan } = React;
function ScanScreen({ onAdd }) {
  const videoRef = useRefScan(null);
  const streamRef = useRefScan(null);
  const fileRef = useRefScan(null);
  const [mode, setMode] = useStateScan('idle');
  const [shot, setShot] = useStateScan(null);
  const [detected, setDetected] = useStateScan([]);
  const [extra, setExtra] = useStateScan('');
  const [note, setNote] = useStateScan(null);
  const [err, setErr] = useStateScan(null);
  const { PP: PPx, Label: LabelX, GoldButton: GoldButtonX, SparkleIcon: SparkleIconX } = window;
  const stop = () => { if (streamRef.current) { streamRef.current.getTracks().forEach(t => t.stop()); streamRef.current = null; } };
  useEffectScan(() => stop, []);
  const reset = () => { stop(); setMode('idle'); setShot(null); setDetected([]); setExtra(''); setNote(null); };
  const openCamera = async () => {
    setErr(null);
    try {
      const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
      streamRef.current = s; setMode('live');
      setTimeout(() => { if (videoRef.current) { videoRef.current.srcObject = s; videoRef.current.play().catch(() => {}); } }, 50);
    } catch (e) { setErr('Camera unavailable — upload a photo instead.'); }
  };
  const analyze = async (dataUrl) => {
    setShot(dataUrl); setMode('analyzing'); setNote(null);
    try {
      const found = await window.ppDetectIngredients(dataUrl);
      setDetected(found);
      setNote(found.length ? null : "AI couldn't spot clear ingredients — add them below.");
    } catch (e) { setDetected([]); setNote('AI detection unavailable — type your ingredients below.'); }
    setMode('review');
  };
  const capture = () => {
    const v = videoRef.current; if (!v) return;
    const c = document.createElement('canvas'); c.width = v.videoWidth || 720; c.height = v.videoHeight || 960;
    c.getContext('2d').drawImage(v, 0, 0, c.width, c.height);
    stop(); analyze(c.toDataURL('image/jpeg', 0.82));
  };
  const onFile = (e) => {
    const f = e.target.files && e.target.files[0]; if (!f) return;
    const reader = new FileReader();
    reader.onload = () => analyze(reader.result);
    reader.readAsDataURL(f); e.target.value = '';
  };
  const removeChip = (d) => setDetected(detected.filter(x => x !== d));
  const addExtra = () => {
    const v = extra.trim();
    if (v && !detected.some(d => d.toLowerCase() === v.toLowerCase())) setDetected([...detected, v]);
    setExtra('');
  };
  const findRecipes = () => { onAdd(detected); reset(); };
  return (
    <div style={{ padding: 'calc(46px + env(safe-area-inset-top)) 22px 28px' }}>
      <LabelX>AI Camera</LabelX>
      <h1 style={{ fontFamily: PPx.serif, fontSize: 28, fontWeight: 700, color: PPx.offWhite, margin: '8px 0 0', letterSpacing: -0.4 }}>Scan your pantry</h1>
      <p style={{ fontFamily: PPx.sans, fontSize: 13.5, color: PPx.warm, lineHeight: 1.6, margin: '10px 0 0' }}>Snap your fridge or shelf and AI will read the ingredients — then confirm anything it missed.</p>
      {mode === 'idle' && (
        <React.Fragment>
          <div className="pp-tap" onClick={openCamera} style={{ marginTop: 22, border: `2px dashed rgba(201,169,110,0.32)`, borderRadius: 18, background: 'rgba(201,169,110,0.05)', padding: '46px 24px', textAlign: 'center', cursor: 'pointer' }}>
            <div style={{ width: 58, height: 58, margin: '0 auto 16px', borderRadius: '50%', background: 'rgba(201,169,110,0.12)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke={PPx.gold} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" /><circle cx="12" cy="13" r="4" /></svg>
            </div>
            <div style={{ fontFamily: PPx.serif, fontSize: 17, fontWeight: 600, color: PPx.offWhite, marginBottom: 6 }}>Open Camera</div>
            <div style={{ fontFamily: PPx.sans, fontSize: 12.5, color: PPx.warm }}>Point at your fridge, shelf or groceries</div>
          </div>
          {err && <div style={{ fontFamily: PPx.sans, fontSize: 12, color: '#e0a17a', marginTop: 12, textAlign: 'center' }}>{err}</div>}
          <button className="pp-tap" onClick={() => fileRef.current && fileRef.current.click()} style={{ width: '100%', marginTop: 14, padding: '13px', background: 'rgba(255,255,255,0.04)', border: `1px solid ${PPx.line}`, borderRadius: 12, cursor: 'pointer', fontFamily: PPx.sans, fontSize: 12.5, fontWeight: 600, letterSpacing: 1, textTransform: 'uppercase', color: PPx.offWhite }}>Upload a Photo Instead</button>
          <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={onFile} style={{ display: 'none' }} />
        </React.Fragment>
      )}
      {mode === 'live' && (
        <React.Fragment>
          <div style={{ marginTop: 22, borderRadius: 18, overflow: 'hidden', border: `1px solid ${PPx.line}`, background: '#000', aspectRatio: '3/4', position: 'relative' }}>
            <video ref={videoRef} playsInline muted style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
            <div style={{ position: 'absolute', inset: 14, border: '2px solid rgba(255,255,255,0.5)', borderRadius: 12, pointerEvents: 'none' }} />
          </div>
          <GoldButtonX onClick={capture} style={{ marginTop: 16 }}>Capture</GoldButtonX>
          <button className="pp-tap" onClick={reset} style={{ width: '100%', marginTop: 10, padding: '12px', background: 'none', border: 'none', cursor: 'pointer', fontFamily: PPx.sans, fontSize: 12, color: PPx.warm, letterSpacing: 1 }}>Cancel</button>
        </React.Fragment>
      )}
      {mode === 'analyzing' && (
        <div style={{ marginTop: 22 }}>
          <div style={{ borderRadius: 18, overflow: 'hidden', border: `1px solid ${PPx.line}`, position: 'relative' }}>
            <img src={shot} alt="Captured" style={{ width: '100%', display: 'block', maxHeight: 300, objectFit: 'cover', filter: 'brightness(0.55)' }} />
            <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 14 }}>
              <span className="pp-spin" style={{ width: 30, height: 30, borderRadius: '50%', border: '3px solid rgba(201,169,110,0.25)', borderTopColor: PPx.gold, display: 'inline-block' }} />
              <div style={{ fontFamily: PPx.sans, fontSize: 13, color: '#fff', display: 'flex', alignItems: 'center', gap: 7 }}><SparkleIconX s={15} c={PPx.goldLight} /> AI is reading your photo…</div>
            </div>
          </div>
        </div>
      )}
      {mode === 'review' && (
        <React.Fragment>
          <div style={{ marginTop: 22, borderRadius: 18, overflow: 'hidden', border: `1px solid ${PPx.line}` }}>
            <img src={shot} alt="Captured" style={{ width: '100%', display: 'block', maxHeight: 220, objectFit: 'cover' }} />
          </div>
          <div style={{ marginTop: 18, padding: 16, background: PPx.surface, border: `1px solid ${PPx.line}`, borderRadius: 14 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 7 }}><SparkleIconX s={14} c={PPx.gold} /><LabelX>Detected by AI</LabelX></div>
              <span style={{ fontFamily: PPx.sans, fontSize: 10, color: PPx.warm, fontStyle: 'italic' }}>tap × to remove</span>
            </div>
            {detected.length > 0 ? (
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
                {detected.map(d => (
                  <button key={d} className="pp-tap" onClick={() => removeChip(d)} style={{ display: 'flex', alignItems: 'center', gap: 7, padding: '7px 13px', borderRadius: 100, background: 'rgba(201,169,110,0.12)', border: '1px solid rgba(201,169,110,0.28)', fontFamily: PPx.sans, fontSize: 12.5, color: PPx.goldLight, cursor: 'pointer' }}>
                    {d}<svg width="9" height="9" viewBox="0 0 10 10" fill="none" stroke={PPx.gold} strokeWidth="1.6" strokeLinecap="round"><path d="M1 1l8 8M9 1l-8 8" /></svg>
                  </button>
                ))}
              </div>
            ) : <div style={{ fontFamily: PPx.sans, fontSize: 12.5, color: PPx.warm, lineHeight: 1.5 }}>Nothing detected — add your ingredients below.</div>}
            {note && <div style={{ fontFamily: PPx.sans, fontSize: 11.5, color: '#d9b48a', marginTop: 12, lineHeight: 1.5 }}>{note}</div>}
          </div>
          <div style={{ marginTop: 16 }}>
            <div style={{ fontFamily: PPx.sans, fontSize: 13, color: PPx.offWhite, marginBottom: 9, fontWeight: 500 }}>Did we miss anything?</div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, background: 'rgba(255,255,255,0.04)', border: `1px solid ${PPx.line}`, borderRadius: 12, padding: '11px 12px' }}>
              <input value={extra} onChange={e => setExtra(e.target.value)} onKeyDown={e => { if (e.key === 'Enter') addExtra(); }} placeholder="Type an ingredient & press +" style={{ flex: 1, minWidth: 0, background: 'transparent', border: 'none', outline: 'none', fontFamily: PPx.sans, fontSize: 14, color: PPx.offWhite }} />
              <button className="pp-tap" onClick={addExtra} style={{ width: 30, height: 30, borderRadius: 9, flexShrink: 0, border: 'none', cursor: 'pointer', background: 'rgba(201,169,110,0.16)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={PPx.gold} strokeWidth="2" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></svg>
              </button>
            </div>
          </div>
          <GoldButtonX onClick={findRecipes} disabled={detected.length === 0} style={{ marginTop: 18 }}>Find Recipes ({detected.length})</GoldButtonX>
          <button className="pp-tap" onClick={reset} style={{ width: '100%', marginTop: 10, padding: '12px', background: 'none', border: 'none', cursor: 'pointer', fontFamily: PPx.sans, fontSize: 12, color: PPx.warm, letterSpacing: 1 }}>Retake</button>
        </React.Fragment>
      )}
    </div>
  );
}
window.ScanScreen = ScanScreen;
</script>

<!-- App Shell + Mount -->
<script type="text/babel">
const { useState: useStateA, useEffect: useEffectA } = React;
const { PP: PPa, store: storeA, auth: authA, SparkleIcon: SparkleIconA } = window;

function GeneratingOverlay() {
  return (
    <div style={{ position: 'absolute', inset: 0, zIndex: 60, background: 'rgba(15,14,13,0.78)', backdropFilter: 'blur(6px)', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 18 }}>
      <span className="pp-spin" style={{ width: 34, height: 34, borderRadius: '50%', border: '3px solid rgba(201,169,110,0.25)', borderTopColor: PPa.gold, display: 'inline-block' }} />
      <div style={{ fontFamily: PPa.sans, fontSize: 14, color: '#fff', display: 'flex', alignItems: 'center', gap: 8 }}><SparkleIconA s={16} c={PPa.goldLight} /> Creating your recipe…</div>
      <div style={{ fontFamily: PPa.sans, fontSize: 12, color: PPa.warm }}>Building something from your pantry</div>
    </div>
  );
}
function Toast({ msg }) {
  if (!msg) return null;
  return <div style={{ position: 'absolute', left: 22, right: 22, bottom: 'calc(90px + env(safe-area-inset-bottom))', zIndex: 70, background: '#2a2724', border: `1px solid ${PPa.line}`, borderRadius: 12, padding: '13px 16px', fontFamily: PPa.sans, fontSize: 13, color: PPa.offWhite, textAlign: 'center', boxShadow: '0 10px 30px rgba(0,0,0,0.4)' }}>{msg}</div>;
}
function PantryHome() {
  const [tab, setTab] = useStateA('home');
  const [pantry, setPantry] = useStateA(() => storeA.get('pp_pantry', []));
  const [savedIds, setSavedIds] = useStateA(() => storeA.get('pp_saved', []));
  const [cookedIds, setCookedIds] = useStateA(() => storeA.get('pp_cooked', []));
  const [aiRecipes, setAiRecipes] = useStateA(() => storeA.get('pp_ai_recipes', []));
  const [user, setUser] = useStateA(() => authA.current());
  const [draft, setDraft] = useStateA('');
  const [openId, setOpenId] = useStateA(null);
  const [showAuth, setShowAuth] = useStateA(false);
  const [generating, setGenerating] = useStateA(false);
  const [toast, setToast] = useStateA(null);
  useEffectA(() => storeA.set('pp_pantry', pantry), [pantry]);
  useEffectA(() => storeA.set('pp_saved', savedIds), [savedIds]);
  useEffectA(() => storeA.set('pp_cooked', cookedIds), [cookedIds]);
  useEffectA(() => storeA.set('pp_ai_recipes', aiRecipes), [aiRecipes]);
  const flashToast = (m) => { setToast(m); setTimeout(() => setToast(null), 2600); };
  const addItem = () => { const v = draft.trim(); if (v && !pantry.some(p => p.toLowerCase() === v.toLowerCase())) setPantry([...pantry, v]); setDraft(''); };
  const removeItem = (c) => setPantry(pantry.filter(x => x !== c));
  const addMany = (arr) => { const lower = pantry.map(p => p.toLowerCase()); const add = (arr || []).filter(a => !lower.includes(a.toLowerCase())); setPantry([...pantry, ...add]); setTab('home'); if (add.length) flashToast(`Added ${add.length} ingredient${add.length > 1 ? 's' : ''} to your pantry`); };
  const toggleSave = (id) => setSavedIds(savedIds.includes(id) ? savedIds.filter(x => x !== id) : [...savedIds, id]);
  const toggleCook = (id) => setCookedIds(cookedIds.includes(id) ? cookedIds.filter(x => x !== id) : [...cookedIds, id]);
  const allRecipes = [...aiRecipes, ...window.RECIPES];
  const findRecipe = (id) => allRecipes.find(r => r.id === id) || null;
  const ranked = window.recommend(pantry);
  const savedRecipes = savedIds.map(findRecipe).filter(Boolean);
  const openRecipe = openId ? findRecipe(openId) : null;
  const onGenerate = async () => {
    if (generating) return; setGenerating(true);
    try {
      const recipe = await window.ppGenerateRecipe(pantry);
      setAiRecipes(prev => [recipe, ...prev].slice(0, 30));
      setGenerating(false); setOpenId(recipe.id);
    } catch (e) { setGenerating(false); flashToast('Could not create a recipe — please try again.'); }
  };
  const onAvatar = () => setTab('profile');
  const onAuthed = (u) => { setUser(u); setShowAuth(false); flashToast(`Welcome, ${u.name.split(' ')[0]}!`); };
  const onLogout = () => { authA.logout(); setUser(null); flashToast('Signed out'); };
  return (
    <div style={{ position: 'relative', height: '100%', display: 'flex', flexDirection: 'column', background: PPa.charcoal, fontFamily: PPa.sans, overflow: 'hidden' }}>
      <div style={{ flex: 1, overflow: 'auto', WebkitOverflowScrolling: 'touch' }}>
        {tab === 'home' && <window.HomeScreen user={user} pantry={pantry} draft={draft} setDraft={setDraft} addItem={addItem} removeItem={removeItem} ranked={ranked} creations={aiRecipes} onOpen={setOpenId} goScan={() => setTab('scan')} onGenerate={onGenerate} generating={generating} onAvatar={onAvatar} />}
        {tab === 'saved' && <window.SavedScreen savedRecipes={savedRecipes} onOpen={setOpenId} goHome={() => setTab('home')} />}
        {tab === 'scan' && <window.ScanScreen onAdd={addMany} />}
        {tab === 'profile' && <window.ProfileScreen user={user} savedCount={savedIds.length} cookedCount={cookedIds.length} pantryCount={pantry.length} creationsCount={aiRecipes.length} onAuth={() => setShowAuth(true)} onLogout={onLogout} />}
      </div>
      <window.TabBar active={tab} onSelect={setTab} />
      {openRecipe && <window.RecipeDetail r={openRecipe} pantry={pantry} isSaved={savedIds.includes(openRecipe.id)} isCooked={cookedIds.includes(openRecipe.id)} onSave={toggleSave} onCook={toggleCook} onClose={() => setOpenId(null)} />}
      {showAuth && <window.AuthSheet onClose={() => setShowAuth(false)} onAuthed={onAuthed} />}
      {generating && <GeneratingOverlay />}
      <Toast msg={toast} />
    </div>
  );
}
function ResponsiveFrame({ children }) {
  const mq = () => window.matchMedia('(max-width: 640px)').matches;
  const [mobile, setMobile] = useStateA(mq);
  const [scale, setScale] = useStateA(1);
  useEffectA(() => {
    const m = window.matchMedia('(max-width: 640px)');
    const onMq = () => setMobile(m.matches);
    const onResize = () => { const s = Math.min(1, (window.innerHeight - 24) / 874, (window.innerWidth - 24) / 402); setScale(s > 0 ? s : 1); };
    onResize();
    m.addEventListener('change', onMq);
    window.addEventListener('resize', onResize);
    return () => { m.removeEventListener('change', onMq); window.removeEventListener('resize', onResize); };
  }, []);
  if (mobile) return <div style={{ position: 'fixed', inset: 0, background: PPa.charcoal }}>{children}</div>;
  return <div style={{ transform: `scale(${scale})`, transformOrigin: 'center center' }}><window.IOSDevice dark>{children}</window.IOSDevice></div>;
}
function PantryApp() {
  return <ResponsiveFrame><PantryHome /></ResponsiveFrame>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<PantryApp />);
</script>
</body>
